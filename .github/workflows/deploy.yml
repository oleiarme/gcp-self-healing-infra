name: terraform-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform # Все команды будут выполняться здесь

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
          
      - name: Smart Pre-deployment Cleanup
        run: |
          echo "Starting smart cleanup..."
          
          # 1. Удаляем Instance Group (чтобы освободить диск и ВМ)
          if gcloud compute instance-groups managed describe n8n-mig --zone=us-central1-a > /dev/null 2>&1; then
            echo "⚠️ Deleting n8n-mig..."
            gcloud compute instance-groups managed delete n8n-mig --zone=us-central1-a --quiet
            sleep 40
          fi

          # 2. ЧИСТКА ЛИШНИХ ДИСКОВ (Критично для Free Tier!)
          # Ищем диски, которые не привязаны к машинам и удаляем их
          ORPHANED_DISKS=$(gcloud compute disks list --filter="-users:*" --format="value(name)")
          if [ ! -z "$ORPHANED_DISKS" ]; then
            echo "⚠️ Found orphaned disks: $ORPHANED_DISKS. Deleting to save money..."
            for disk in $ORPHANED_DISKS; do
              gcloud compute disks delete $disk --zone=us-central1-a --quiet
            done
          fi

          # 3. Удаляем Health Check (он часто мешает пересозданию)
          if gcloud compute health-checks describe n8n-health-check --global > /dev/null 2>&1; then
            gcloud compute health-checks delete n8n-health-check --global --quiet
          fi
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_CF_TUNNEL_TOKEN: ${{ secrets.TF_VAR_CF_TUNNEL_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_n8n_encryption_key: ${{ secrets.TF_VAR_n8n_encryption_key }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_db_host: ${{ vars.TF_VAR_db_host }}
          TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
