name: terraform-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
          
      - name: Pre-deployment Cleanup
        run: |
          echo "Checking for existing resources to avoid conflicts..."
          
          # Delete Secret if exists
          echo "Attempting to delete old secret..."
          gcloud secrets delete db-password --quiet || echo "Secret not found, skipping."
          
          # Delete Service Account if exists
          echo "Attempting to delete old service account..."
          gcloud iam service-accounts delete n8n-vm-sa@idealist-426118.iam.gserviceaccount.com --quiet || echo "Service account not found, skipping."
          
          # Delete Health Check if exists
          echo "Attempting to delete old health check..."
          gcloud compute health-checks delete n8n-health-check --global --quiet || echo "Health check not found, skipping."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_CF_TUNNEL_TOKEN: ${{ secrets.TF_VAR_CF_TUNNEL_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_n8n_encryption_key: ${{ secrets.TF_VAR_n8n_encryption_key }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_db_host: ${{ vars.TF_VAR_db_host }}
          TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
