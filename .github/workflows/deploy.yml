name: terraform-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
          
      - name: Smart Pre-deployment Cleanup
        run: |
          echo "Starting smart cleanup to avoid 409 Conflict errors..."
          
          # 1. Секрет (Secret)
          echo "--- Checking Secret ---"
          if gcloud secrets describe db-password > /dev/null 2>&1; then
            echo "⚠️ Secret 'db-password' found. Deleting..."
            gcloud secrets delete db-password --quiet
            echo "Waiting 10 seconds for API to update..."
            sleep 10
          else
            echo "✅ Secret not found. Skipping."
          fi
          
          # 2. Сервисный аккаунт (Service Account)
          echo "--- Checking Service Account ---"
          if gcloud iam service-accounts describe n8n-vm-sa@idealist-426118.iam.gserviceaccount.com > /dev/null 2>&1; then
            echo "⚠️ Service account 'n8n-vm-sa' found. Deleting..."
            gcloud iam service-accounts delete n8n-vm-sa@idealist-426118.iam.gserviceaccount.com --quiet
            echo "Waiting 15 seconds for IAM to update..."
            sleep 15
          else
            echo "✅ Service account not found. Skipping."
          fi
          
          # 3. Проверка состояния (Health Check)
          echo "--- Checking Health Check ---"
          if gcloud compute health-checks describe n8n-health-check --global > /dev/null 2>&1; then
            echo "⚠️ Health check 'n8n-health-check' found. Deleting..."
            gcloud compute health-checks delete n8n-health-check --global --quiet
            echo "Waiting 30 seconds for global network to update..."
            sleep 30
          else
            echo "✅ Health check not found. Skipping."
          fi
          
          echo "Cleanup finished! The environment is ready for Terraform."
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_CF_TUNNEL_TOKEN: ${{ secrets.TF_VAR_CF_TUNNEL_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_n8n_encryption_key: ${{ secrets.TF_VAR_n8n_encryption_key }}
          TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
          TF_VAR_db_host: ${{ vars.TF_VAR_db_host }}
          TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
