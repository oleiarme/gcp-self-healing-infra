name: App Deploy (In-Place)
# Shearing Layers: infrastructure changes rarely, application changes often.
# This workflow updates Docker containers on the running VM via SSH (IAP),
# without recreating the VM. Downtime: 2-5 seconds (docker compose restart)
# vs 1-3 minutes (MIG RECREATE).
#
# Use this for: n8n version bumps, cloudflared updates, config changes.
# Use deploy.yml for: disk size, network, firewall, MIG, IAM changes.
on:
  workflow_dispatch:
    inputs:
      n8n_image:
        description: 'n8n image ref (tag@digest). Leave empty to use default from variables.tf'
        required: false
        type: string
      cloudflared_image:
        description: 'cloudflared image ref (tag@digest). Leave empty to use default'
        required: false
        type: string
      skip_mirror:
        description: 'Skip AR mirror step (image already in AR)'
        required: false
        type: boolean
        default: false
concurrency:
  group: app-deploy
  cancel-in-progress: false
jobs:
  deploy:
    name: In-Place Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: ${{ vars.TF_VAR_project_id }}
      REGION: ${{ vars.TF_VAR_region || 'us-central1' }}
      ZONE: ${{ vars.TF_VAR_zone || 'us-central1-a' }}
      AR_REPO: n8n-docker
      # Resolve image refs: workflow input > GitHub var > hardcoded default
      N8N_IMAGE: ${{ inputs.n8n_image || vars.TF_VAR_n8n_image || 'docker.n8n.io/n8nio/n8n:2.17.7@sha256:a293b89bac876872a0c1ef0fbbb7ce056aa2d215f62917acf032ecb8010199af' }}
      CF_IMAGE: ${{ inputs.cloudflared_image || vars.TF_VAR_cloudflared_image || 'cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0' }}
      N8N_TAG: ${{ vars.TF_VAR_n8n_image_tag || '2.17.7' }}
      CF_TAG: ${{ vars.TF_VAR_cloudflared_image_tag || '2026.3.0' }}
    steps:
      - uses: actions/checkout@v6
      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      # Mirror images to AR (same logic as deploy.yml, reused for consistency)
      - name: Mirror images to Artifact Registry
        if: ${{ !inputs.skip_mirror }}
        continue-on-error: true
        run: |
          set -eo pipefail
          AR="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          if ! gcloud artifacts repositories describe "$AR_REPO" \
               --location="$REGION" --project="$PROJECT" \
               --format="value(name)" 2>/dev/null; then
            echo "::notice::AR repo does not exist yet. Skipping mirror."
            exit 0
          fi
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          N8N_DS="${N8N_IMAGE##*@sha256:}"; N8N_DS="${N8N_DS:0:8}"
          CF_DS="${CF_IMAGE##*@sha256:}"; CF_DS="${CF_DS:0:8}"
          for PAIR in "${N8N_IMAGE} ${AR}/n8n:${N8N_TAG}-${N8N_DS}" \
                      "${CF_IMAGE} ${AR}/cloudflared:${CF_TAG}-${CF_DS}"; do
            SRC="${PAIR%% *}"
            DST="${PAIR#* }"
            echo ">>> Mirroring ${SRC} → ${DST}"
            docker pull "${SRC}"
            docker tag  "${SRC}" "${DST}"
            docker push "${DST}"
          done
      # Find the VM instance managed by the MIG
      - name: Resolve VM instance
        id: vm
        run: |
          set -eo pipefail
          # List instances in the regional MIG
          INSTANCE=$(gcloud compute instance-groups managed list-instances n8n-mig \
            --region="${REGION}" --project="${PROJECT}" \
            --format="value(instance.basename())" | head -1)
          if [ -z "$INSTANCE" ]; then
            echo "::error::No running instance found in MIG n8n-mig"
            exit 1
          fi
          echo "instance=${INSTANCE}" >> "$GITHUB_OUTPUT"
          echo "::notice::Target VM: ${INSTANCE} in ${ZONE}"
      # SSH into the VM and do in-place container update
      - name: Deploy via SSH (IAP)
        run: |
          set -eo pipefail
          # Build AR image refs (same logic as startup.sh locals)
          AR="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          N8N_DS="${N8N_IMAGE##*@sha256:}"; N8N_DS="${N8N_DS:0:8}"
          CF_DS="${CF_IMAGE##*@sha256:}"; CF_DS="${CF_DS:0:8}"
          AR_N8N="${AR}/n8n:${N8N_TAG}-${N8N_DS}"
          AR_CF="${AR}/cloudflared:${CF_TAG}-${CF_DS}"
          gcloud compute ssh "${{ steps.vm.outputs.instance }}" \
            --zone="${ZONE}" \
            --project="${PROJECT}" \
            --tunnel-through-iap \
            --command="
              set -eo pipefail
              cd /opt/n8n
              echo '=== In-Place Deploy ==='
              # Try AR image first, fall back to public
              N8N_TARGET='${AR_N8N}'
              if ! docker image inspect \"\$N8N_TARGET\" >/dev/null 2>&1; then
                if ! docker pull \"\$N8N_TARGET\" 2>/dev/null; then
                  echo 'AR miss for n8n, using public image'
                  N8N_TARGET='${N8N_IMAGE}'
                  docker pull \"\$N8N_TARGET\"
                fi
              else
                echo 'n8n image already cached'
              fi
              CF_TARGET='${AR_CF}'
              if ! docker image inspect \"\$CF_TARGET\" >/dev/null 2>&1; then
                if ! docker pull \"\$CF_TARGET\" 2>/dev/null; then
                  echo 'AR miss for cloudflared, using public image'
                  CF_TARGET='${CF_IMAGE}'
                  docker pull \"\$CF_TARGET\"
                fi
              else
                echo 'cloudflared image already cached'
              fi
              # Update .env with new image refs (preserving secrets)
              sed -i \"s|^N8N_IMAGE=.*|N8N_IMAGE=\${N8N_TARGET}|\" .env
              sed -i \"s|^CLOUDFLARED_IMAGE=.*|CLOUDFLARED_IMAGE=\${CF_TARGET}|\" .env
              # Restart containers with new images (2-5 sec downtime)
              docker compose up -d --no-deps n8n
              docker compose up -d --no-deps cloudflared
              echo '=== Deploy complete ==='
              docker compose ps
            "
      # Quick health check after deploy
      - name: Verify deployment
        run: |
          echo "Waiting 30s for containers to stabilize..."
          sleep 30
          gcloud compute ssh "${{ steps.vm.outputs.instance }}" \
            --zone="${ZONE}" \
            --project="${PROJECT}" \
            --tunnel-through-iap \
            --command="
              cd /opt/n8n
              echo '=== Health Check ==='
              docker compose ps
              echo ''
              echo '=== n8n logs (last 10 lines) ==='
              docker compose logs --tail=10 n8n
            "