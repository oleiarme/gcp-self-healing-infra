name: App Deploy (In-Place)
# Shearing Layers: infrastructure changes rarely, application changes often.
# This workflow updates Docker containers on the running VM via SSH (IAP),
# without recreating the VM. Downtime: roughly one container restart
# vs 1-3 minutes (MIG RECREATE).
#
# Use this for: n8n version bumps, cloudflared updates, config changes.
# Use deploy.yml for: disk size, network, firewall, MIG, IAM changes.
on:
  workflow_dispatch:
    inputs:
      n8n_image:
        description: 'n8n image ref (tag@digest). Leave empty to use default from variables.tf'
        required: false
        type: string
      cloudflared_image:
        description: 'cloudflared image ref (tag@digest). Leave empty to use default'
        required: false
        type: string
      skip_mirror:
        description: 'Skip AR mirror step (image already in AR)'
        required: false
        type: boolean
        default: false
concurrency:
  group: app-deploy
  cancel-in-progress: false
jobs:
  deploy:
    name: In-Place Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: ${{ vars.TF_VAR_project_id }}
      REGION: ${{ vars.TF_VAR_region || 'us-central1' }}
      ZONE: ${{ vars.TF_VAR_zone || 'us-central1-a' }}
      AR_REPO: n8n-docker
      # Resolve image refs: workflow input > GitHub var > hardcoded default
      N8N_IMAGE: ${{ inputs.n8n_image || vars.TF_VAR_n8n_image || 'docker.io/n8nio/n8n:2.17.7@sha256:a293b89bac876872a0c1ef0fbbb7ce056aa2d215f62917acf032ecb8010199af' }}
      CF_IMAGE: ${{ inputs.cloudflared_image || vars.TF_VAR_cloudflared_image || 'docker.io/cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0' }}
      N8N_TAG: ${{ vars.TF_VAR_n8n_image_tag || '2.17.7' }}
      CF_TAG: ${{ vars.TF_VAR_cloudflared_image_tag || '2026.3.0' }}
    steps:
      - uses: actions/checkout@v6
      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      # Mirror images to AR (same logic as deploy.yml, reused for consistency)
      - name: Mirror images to Artifact Registry
        if: ${{ !inputs.skip_mirror }}
        continue-on-error: true
        run: |
          set -eo pipefail
          AR="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          if ! gcloud artifacts repositories describe "$AR_REPO" \
               --location="$REGION" --project="$PROJECT" \
               --format="value(name)" 2>/dev/null; then
            echo "::notice::AR repo does not exist yet. Skipping mirror."
            exit 0
          fi
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          N8N_DS="${N8N_IMAGE##*@sha256:}"; N8N_DS="${N8N_DS:0:8}"
          CF_DS="${CF_IMAGE##*@sha256:}"; CF_DS="${CF_DS:0:8}"
          for PAIR in "${N8N_IMAGE} ${AR}/n8n:${N8N_TAG}-${N8N_DS}" \
                      "${CF_IMAGE} ${AR}/cloudflared:${CF_TAG}-${CF_DS}"; do
            SRC="${PAIR%% *}"
            DST="${PAIR#* }"
            echo ">>> Mirroring ${SRC} → ${DST}"
            docker pull "${SRC}"
            docker tag  "${SRC}" "${DST}"
            docker push "${DST}"
          done
      - name: Resolve VM instance
        id: vm
        run: |
          set -eo pipefail
          INSTANCE_URL=$(gcloud compute instance-groups managed list-instances n8n-mig \
            --region="${REGION}" --project="${PROJECT}" \
            --format="value(instance)" | head -1)
          INSTANCE="${INSTANCE_URL##*/}"
          ZONE_FROM_URL=$(echo "$INSTANCE_URL" | sed -n 's#.*/zones/\([^/]*\)/instances/.*#\1#p')
          if [ -z "$INSTANCE" ]; then
            echo "::error::No running instance found in MIG n8n-mig"
            exit 1
          fi
          if [ -z "$ZONE_FROM_URL" ]; then
            echo "::error::Could not parse zone from instance URL: $INSTANCE_URL"
            exit 1
          fi
          echo "instance=${INSTANCE}" >> "$GITHUB_OUTPUT"
          echo "zone=${ZONE_FROM_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Target VM: ${INSTANCE} in ${ZONE_FROM_URL}"
      # SSH into the VM and do in-place container update
      - name: Deploy via SSH (IAP)
        run: |
          set -eo pipefail
          # Build AR image refs (same logic as startup.sh locals)
          AR="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          N8N_DS="${N8N_IMAGE##*@sha256:}"; N8N_DS="${N8N_DS:0:8}"
          CF_DS="${CF_IMAGE##*@sha256:}"; CF_DS="${CF_DS:0:8}"
          AR_N8N="${AR}/n8n:${N8N_TAG}-${N8N_DS}"
          AR_CF="${AR}/cloudflared:${CF_TAG}-${CF_DS}"
          gcloud compute ssh "${{ steps.vm.outputs.instance }}" \
            --zone="${{ steps.vm.outputs.zone }}" \
            --project="${PROJECT}" \
            --tunnel-through-iap \
            --command="sudo env N8N_PRIMARY='${AR_N8N}' N8N_FALLBACK='${N8N_IMAGE}' CF_PRIMARY='${AR_CF}' CF_FALLBACK='${CF_IMAGE}' bash -s" <<'REMOTE'
              set -eo pipefail
              echo '=== In-Place Deploy ==='

              if [ ! -f /home/docker/runtime.env ]; then
                echo 'Missing /home/docker/runtime.env. Recreate the VM with the current startup_cos.sh first.'
                exit 1
              fi
              # shellcheck disable=SC1091
              . /home/docker/runtime.env

              pull_with_fallback() {
                local name="$1"
                local primary="$2"
                local fallback="$3"
                local selected="$primary"
                if ! docker pull "$primary" >&2; then
                  echo "AR miss for $name, using public image" >&2
                  selected="$fallback"
                  docker pull "$selected" >&2
                fi
                printf "%s" "$selected"
              }

              N8N_TARGET=$(pull_with_fallback n8n "$N8N_PRIMARY" "$N8N_FALLBACK")
              CF_TARGET=$(pull_with_fallback cloudflared "$CF_PRIMARY" "$CF_FALLBACK")

              sed -i "s|^N8N_TARGET=.*|N8N_TARGET=${N8N_TARGET}|" /home/docker/runtime.env
              sed -i "s|^CF_TARGET=.*|CF_TARGET=${CF_TARGET}|" /home/docker/runtime.env

              docker rm -f n8n 2>/dev/null || true
              docker run -d \
                --name n8n \
                --network n8n-net \
                --restart unless-stopped \
                -p 127.0.0.1:5678:5678 \
                -v /dev/shm/n8n-secrets:/run/secrets:ro \
                -e DB_TYPE=postgresdb \
                -e DB_POSTGRESDB_HOST=postgres \
                -e DB_POSTGRESDB_PORT="${DB_PORT}" \
                -e DB_POSTGRESDB_DATABASE="${DB_NAME}" \
                -e DB_POSTGRESDB_USER="${DB_USER}" \
                -e DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/db_password \
                -e N8N_ENCRYPTION_KEY_FILE=/run/secrets/n8n_key \
                -e N8N_EXECUTIONS_MODE=regular \
                -e N8N_CONCURRENCY_PRODUCTION_LIMIT=1 \
                -e N8N_LOG_LEVEL=warn \
                -e EXECUTIONS_DATA_SAVE_ON_SUCCESS=none \
                -e EXECUTIONS_DATA_SAVE_ON_ERROR=all \
                -e EXECUTIONS_DATA_PRUNE=true \
                -e EXECUTIONS_DATA_MAX_AGE_HISTORY=24 \
                -e N8N_RUNNERS_ENABLED=true \
                -e N8N_RUNNERS_MODE=internal \
                -e N8N_HOST="${N8N_PUBLIC_HOST}" \
                -e N8N_PROTOCOL=https \
                -e WEBHOOK_URL="https://${N8N_PUBLIC_HOST}/" \
                -e N8N_DIAGNOSTICS_ENABLED=false \
                -e N8N_METRICS_ENABLED=false \
                -e N8N_PORT=5678 \
                -e N8N_LISTEN_ADDRESS=0.0.0.0 \
                -e DB_POSTGRESDB_CONNECTION_TIMEOUT=60000 \
                "$N8N_TARGET"

              for i in {1..30}; do
                if curl -sf http://127.0.0.1:5678/healthz >/dev/null 2>&1; then
                  echo 'n8n is healthy'
                  break
                fi
                sleep 2
              done

              docker rm -f cloudflared 2>/dev/null || true
              docker run -d \
                --name cloudflared \
                --network n8n-net \
                --restart unless-stopped \
                -p 127.0.0.1:2000:2000 \
                -v /dev/shm/n8n-secrets/cf_token:/run/secrets/cf_token:ro \
                "$CF_TARGET" \
                tunnel --no-autoupdate --protocol http2 --metrics 0.0.0.0:2000 run --token-file /run/secrets/cf_token

              echo '=== Deploy complete ==='
              docker ps --filter name=n8n --filter name=cloudflared
          REMOTE
      # Quick health check after deploy
      - name: Verify deployment
        run: |
          echo "Waiting 30s for containers to stabilize..."
          sleep 30
          gcloud compute ssh "${{ steps.vm.outputs.instance }}" \
            --zone="${{ steps.vm.outputs.zone }}" \
            --project="${PROJECT}" \
            --tunnel-through-iap \
            --command="
              echo '=== Health Check ==='
              sudo docker ps --filter name=n8n --filter name=cloudflared
              echo ''
              echo '=== n8n logs (last 10 lines) ==='
              sudo docker logs --tail=10 n8n
            "
