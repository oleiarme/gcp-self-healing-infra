name: container-image-digest-refresh

# Weekly job that re-resolves the SHA256 digest of every image referenced in
# terraform/variables.tf (see scripts/refresh-digests.sh for the list) and
# opens a PR with the bumped digests if any have changed.
#
# Why this exists: Dependabot's docker ecosystem only scans Dockerfiles and
# docker-compose files. The digests in this repo live inside Terraform
# variable defaults, which no Dependabot ecosystem understands. This
# workflow fills that gap so the supply-chain claim in README.md
# ("Security Posture → Container image pinning") is true.

on:
  schedule:
    # Mondays 06:00 UTC — matches .github/dependabot.yml cadence.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  # Minimum required for peter-evans/create-pull-request:
  #   contents:write       → push the bump branch
  #   pull-requests:write  → open the PR
  # All other permissions are implicitly denied.
  contents: write
  pull-requests: write

concurrency:
  group: digest-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Resolve digests and open PR if changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install crane
        # crane is the canonical go-containerregistry CLI for digest lookups.
        # Pinned to an official release to make supply chain of the bumper
        # itself auditable.
        run: |
          VER="v0.20.2"
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/${VER}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane
          crane version

      - name: Refresh digests in terraform/variables.tf
        run: bash scripts/refresh-digests.sh

      - name: Verify Terraform still validates after the bump
        # If upstream renamed an image or changed manifest schema, the bump
        # would still produce syntactically valid HCL but break the plan.
        # Catching that here is strictly better than catching it in the PR
        # CI the reviewer would otherwise have to chase.
        uses: hashicorp/setup-terraform@v3
      - run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Open PR if variables.tf changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(supply-chain): refresh container image digests"
          branch: chore/refresh-image-digests
          branch-suffix: timestamp
          delete-branch: true
          title: "chore(supply-chain): refresh container image digests"
          body: |
            Automated weekly refresh of the SHA256 digests pinned in
            `terraform/variables.tf` (`var.n8n_image`, `var.cloudflared_image`).

            Generated by `.github/workflows/digest-refresh.yml` via
            `scripts/refresh-digests.sh` (which uses `crane digest`).

            ### Why digests bump without a tag change
            Upstream images (n8n, cloudflared) are periodically republished
            under the same semver tag with new layers — CVE patches, base
            image updates, etc. Without digest pinning the VM would pull
            whichever layers are current at MIG-replacement time, i.e.
            unreviewed code shipping to production. This PR brings the
            digests forward so we re-consume those changes deliberately.

            ### How to review
            1. Inspect the diff. It should only touch digest portions of
               `var.n8n_image` / `var.cloudflared_image` defaults.
            2. Optionally cross-check one digest manually:
               `crane digest docker.n8n.io/n8nio/n8n:2.16.1`
            3. Upstream changelogs (if available):
               - n8n: https://github.com/n8n-io/n8n/releases
               - cloudflared: https://github.com/cloudflare/cloudflared/releases
            4. CI will run the full `terraform validate` + `tfsec` +
               `checkov` + `tflint` + `shellcheck` suite. If any of these
               go red, something other than a benign digest bump changed.

            Close this PR without merging to skip the bump for this cycle.
          labels: |
            supply-chain
            dependencies
          draft: false
