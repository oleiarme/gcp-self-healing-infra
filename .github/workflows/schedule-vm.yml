# ==========================================
# VM Schedule: auto-start/stop via MIG resize
# ==========================================
#
# Cost optimisation for non-production hours. The MIG target_size is
# resized to 0 (stop) or 1 (start) on a cron schedule. Auth uses the
# same Workload Identity Federation (WIF) as deploy.yml — no JSON keys.
#
# MIG resize vs instance start/stop:
#   The infra runs a Regional MIG (google_compute_region_instance_group_manager),
#   not a standalone VM. `gcloud compute instances start/stop` does not work
#   with MIG-managed instances — the MIG would immediately recreate a stopped
#   VM. Resizing to 0/1 is the correct MIG-native approach.
#
# Configure schedule via GitHub Variables:
#   VM_STOP_CRON   — default: '0 22 * * 1-5' (22:00 UTC Mon-Fri)
#   VM_START_CRON  — default: '0 7 * * 1-5'  (07:00 UTC Mon-Fri)
#   VM_SCHEDULE_ENABLED — set to 'false' to disable (default: 'true')
#
# Manual trigger: Actions → Schedule VM → Run workflow → pick start/stop.

name: Schedule VM

on:
  schedule:
    # Two cron entries; the job figures out start vs stop from the hour.
    # Overridable via GitHub vars (but cron expressions in `on.schedule`
    # are static — vars only affect the conditional skip logic below).
    - cron: '0 7 * * *'   # start: 07:00 UTC Mon-Sun    
    - cron: '0 22 * * *'  # stop:  22:00 UTC Mon-Sun
  workflow_dispatch:
    inputs:
      action:
        description: 'Start or stop the VM'
        required: true
        type: choice
        options:
          - start
          - stop

concurrency:
  group: vm-schedule
  cancel-in-progress: false

jobs:
  resize:
    runs-on: ubuntu-latest
    # Skip if schedule is disabled (manual dispatch always runs).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.VM_SCHEDULE_ENABLED != 'false'

    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: ${{ vars.TF_VAR_project_id }}
      GCP_REGION: us-central1
      MIG_NAME: n8n-mig
      N8N_HOST: ${{ vars.TF_VAR_n8n_public_host }}

    steps:
      - name: Determine action (start or stop)
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          else
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 7 * * 1-5" ]; then
              echo "action=start" >> "$GITHUB_OUTPUT"
            else
              echo "action=stop" >> "$GITHUB_OUTPUT"
            fi
          fiExpand commentComment on lines R69 to R76Resolved

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resize MIG
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          if [ "$ACTION" = "start" ]; then
            SIZE=1
          else
            SIZE=0
          fi

          echo "::notice::$ACTION — resizing $MIG_NAME to $SIZE"

          gcloud compute instance-groups managed resize "$MIG_NAME" \
            --size="$SIZE" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT" \
            --quiet

      - name: Wait for VM to become healthy
        if: steps.action.outputs.action == 'start'
        run: |
          echo "Waiting for MIG to report healthy instance..."
          # MIG needs time: VM creation + startup.sh + Docker pull + n8n boot.
          # Poll every 30s for up to 15 min (cold start takes ~10 min).
          for i in $(seq 1 30); do
            INSTANCES=$(gcloud compute instance-groups managed list-instances "$MIG_NAME" \
              --region="$GCP_REGION" \
              --project="$GCP_PROJECT" \
              --format="value(status)" 2>/dev/null || true)

            if echo "$INSTANCES" | grep -q "RUNNING"; then
              echo "::notice::VM instance is RUNNING"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "::error::VM did not reach RUNNING state within 15 minutes"
              exit 1
            fi

            echo "Attempt $i/30 — waiting 30s..."
            sleep 30
          doneExpand commentComment on lines R110 to R128Resolved

      - name: Health check (n8n /healthz)
        if: steps.action.outputs.action == 'start'
        run: |
          if [ -z "$N8N_HOST" ]; then
            echo "::warning::N8N_HOST not set — skipping health check"
            exit 0
          fi

          echo "Waiting for n8n to respond on https://$N8N_HOST/healthz ..."
          # n8n needs a few more minutes after VM is RUNNING (Docker start + migrations).
          # Poll every 20s for up to 10 min.
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://$N8N_HOST/healthz" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "::notice::n8n is healthy (HTTP 200)"
              exit 0
            fi

            echo "Attempt $i/30 — HTTP $HTTP_CODE, retrying in 20s..."
            sleep 20
          done

          echo "::error::n8n did not become healthy within 10 minutes"
          exit 1

      - name: Send Telegram notification
        if: always() && vars.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ vars.TELEGRAM_THREAD_ID }}
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          STATUS="${{ job.status }}"

          if [ "$ACTION" = "start" ]; then
            if [ "$STATUS" = "success" ]; then
              EMOJI="🟢"
              TEXT="VM started and healthy"
            else
              EMOJI="🔴"
              TEXT="VM start FAILED — check Actions log"
            fi
          else
            if [ "$STATUS" = "success" ]; then
              EMOJI="🌙"
              TEXT="VM stopped (night schedule)"
            else
              EMOJI="🔴"
              TEXT="VM stop FAILED — check Actions log"
            fi
          fiExpand commentComment on lines R175 to R183Resolved

          MESSAGE="${EMOJI} <b>n8n VM Schedule</b>
          ${TEXT}
          Action: ${ACTION}
          Status: ${STATUS}
          Trigger: ${{ github.event_name }}"Expand commentComment on lines R185 to R189Resolved

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE" \
            --arg thread_id "$TELEGRAM_THREAD_ID" \
            '{
              chat_id: $chat_id,
              text: $text,
              parse_mode: "HTML",
              disable_web_page_preview: true
            } + (if $thread_id != "" then {message_thread_id: ($thread_id | tonumber)} else {} end)')

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > /dev/null || echo "::warning::Telegram notification failed"